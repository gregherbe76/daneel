kind = "web"
previewPath = "/"
title = "Recruiting OS"
version = "1.0.0"
id = "artifacts/recruiting-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21439

[services.development]
run = "pnpm --filter @workspace/recruiting-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/recruiting-os", "run", "build" ]
publicDir = "artifacts/recruiting-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21439"
BASE_PATH = "/"
