openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HiringAI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Job operations
  - name: candidates
    description: Candidate operations
  - name: applications
    description: Application pipeline operations
  - name: workflows
    description: Agentic workflow operations
  - name: providers
    description: Agent provider management
  - name: reports
    description: Hiring manager report exports
  - name: notes
    description: Recruiter notes and threaded team comments on candidates
  - name: team
    description: Lightweight team roster used for @mentions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── JOBS ──────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{id}/applications:
    get:
      operationId: getJobApplications
      tags: [jobs]
      summary: Get all applications for a job (with candidate info)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Applications for this job
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"

  # ── CANDIDATES ────────────────────────────────────────────────────────────
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List all candidates
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"
    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateBody"
      responses:
        "201":
          description: Candidate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Not found
    put:
      operationId: updateCandidate
      tags: [candidates]
      summary: Update a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateBody"
      responses:
        "200":
          description: Candidate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
    delete:
      operationId: deleteCandidate
      tags: [candidates]
      summary: Delete a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /candidates/{id}/applications:
    get:
      operationId: getCandidateApplications
      tags: [candidates]
      summary: Get all applications for a candidate (with job info)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Applications for this candidate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"

  # ── APPLICATIONS ──────────────────────────────────────────────────────────
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List all applications with candidate and job info
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create an application (link candidate to job)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get an application by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationWithDetails"
        "404":
          description: Not found
    put:
      operationId: updateApplication
      tags: [applications]
      summary: Update an application (e.g. change stage)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── WORKFLOWS ─────────────────────────────────────────────────────────────
  /workflows/run:
    post:
      operationId: runWorkflow
      tags: [workflows]
      summary: Start an agentic workflow run for a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunWorkflowBody"
      responses:
        "201":
          description: Workflow run created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"

  /workflows/runs:
    get:
      operationId: listWorkflowRuns
      tags: [workflows]
      summary: List all workflow runs
      responses:
        "200":
          description: List of workflow runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRun"

  /workflows/runs/{id}:
    get:
      operationId: getWorkflowRun
      tags: [workflows]
      summary: Get a specific workflow run with logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow run with logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunWithLogs"
        "404":
          description: Not found

  /workflows/jobs/{jobId}/latest:
    get:
      operationId: getLatestJobWorkflow
      tags: [workflows]
      summary: Get the latest workflow run for a job (with results)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest run with insights, evaluations, shortlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobWorkflowResult"
        "404":
          description: No runs found for this job

  # ── AGENT PROVIDERS ────────────────────────────────────────────────────────
  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all agent providers
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentProviderRecord"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a new agent provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderBody"
      responses:
        "201":
          description: Provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"

  /providers/{id}:
    get:
      operationId: getProvider
      tags: [providers]
      summary: Get a provider by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"
        "404":
          description: Not found
    put:
      operationId: updateProvider
      tags: [providers]
      summary: Update a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderBody"
      responses:
        "200":
          description: Provider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"
    delete:
      operationId: deleteProvider
      tags: [providers]
      summary: Delete a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /providers/{id}/toggle:
    post:
      operationId: toggleProvider
      tags: [providers]
      summary: Enable or disable a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleProviderBody"
      responses:
        "200":
          description: Provider toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"

  /providers/{id}/test:
    post:
      operationId: testProviderConnection
      tags: [providers]
      summary: Test a provider connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /providers/steps:
    get:
      operationId: listProviderStepSettings
      tags: [providers]
      summary: List all workflow step → provider assignments
      responses:
        "200":
          description: Step settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderStepSettingWithProvider"
    post:
      operationId: upsertProviderStepSetting
      tags: [providers]
      summary: Assign a provider to a workflow step (create or replace)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertStepSettingBody"
      responses:
        "200":
          description: Setting saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderStepSettingWithProvider"

  /workflows/improve-and-rerun:
    post:
      operationId: improveAndRerun
      tags: [workflows]
      summary: Enrich low-confidence candidates from a completed run and re-score them
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveAndRerunBody"
      responses:
        "201":
          description: New run created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImproveAndRerunResult"
        "400":
          description: No low-confidence candidates found or run not completed
        "404":
          description: Run not found

  /workflows/run-variant:
    post:
      operationId: runVariantWorkflow
      tags: [workflows]
      summary: Create and run a variant workflow with modified job criteria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunVariantBody"
      responses:
        "201":
          description: Variant run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"

  /workflows/jobs/{jobId}/runs:
    get:
      operationId: listJobRuns
      tags: [workflows]
      summary: List all runs for a job (baseline + variants)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobRunSummary"

  # ── SUMMARY / WOW ─────────────────────────────────────────────────────────
  # ── REPORTS ────────────────────────────────────────────────────────────────
  /reports/job/{jobId}/run/{runId}:
    get:
      operationId: getJobReportForRun
      tags: [reports]
      summary: Get hiring manager report for a specific workflow run
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hiring manager report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiringReport"
        "404":
          description: Run not found

  /reports/job/{jobId}/latest:
    get:
      operationId: getJobReport
      tags: [reports]
      summary: Get full hiring manager report for the latest completed workflow run
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hiring manager report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiringReport"
        "404":
          description: No completed run found

  /reports/job/{jobId}/latest/markdown:
    get:
      operationId: getJobReportMarkdown
      tags: [reports]
      summary: Export hiring manager report as Markdown
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Markdown report file
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: No completed run found

  /reports/job/{jobId}/latest/pdf:
    get:
      operationId: getJobReportPdf
      tags: [reports]
      summary: Export hiring manager report as PDF
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF report file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: No completed run found

  # ── NOTES & COMMENTS ────────────────────────────────────────────────────────
  /candidates/{candidateId}/notes:
    get:
      operationId: listCandidateNotes
      tags: [notes]
      summary: List recruiter notes for a candidate (optionally scoped to a job)
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Notes for the candidate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateNote"
    post:
      operationId: createCandidateNote
      tags: [notes]
      summary: Add a recruiter note to a candidate
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateNoteBody"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateNote"

  /candidates/{candidateId}/notes/{noteId}:
    delete:
      operationId: deleteCandidateNote
      tags: [notes]
      summary: Delete a recruiter note
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /candidates/{candidateId}/comments:
    get:
      operationId: listCandidateComments
      tags: [notes]
      summary: List threaded team comments for a candidate (optionally scoped to a job)
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Comments for the candidate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateComment"
    post:
      operationId: createCandidateComment
      tags: [notes]
      summary: Add a comment (top-level or reply) to a candidate
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateCommentBody"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateComment"

  /candidates/{candidateId}/comments/{commentId}:
    delete:
      operationId: deleteCandidateComment
      tags: [notes]
      summary: Delete a comment
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── TEAM ────────────────────────────────────────────────────────────────────
  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List the team roster used for @mention autocomplete
      responses:
        "200":
          description: Team roster
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /team/{memberId}/mentions:
    get:
      operationId: listMentionsForMember
      tags: [team]
      summary: List recent comments that mention a given team member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: ISO timestamp; only return comments newer than this
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Comments mentioning this member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentionEntry"

  /pipeline/summary:
    get:
      operationId: getPipelineSummary
      tags: [applications]
      summary: Get pipeline summary - counts per stage across all jobs
      responses:
        "200":
          description: Pipeline stage counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── ENUMS ──
    Seniority:
      type: string
      enum: [Intern, Junior, Mid, Senior, Lead, Principal, Director, VP]

    ApplicationStage:
      type: string
      enum: [Sourced, Contacted, Screened, Interview, Offer, Hired, Rejected]

    # ── JOB ──
    ScoringWeights:
      type: object
      description: Per-job scoring weights (integer percentages 0-100, must sum to 100).
      properties:
        autonomy:
          type: integer
          minimum: 0
          maximum: 100
        productMindset:
          type: integer
          minimum: 0
          maximum: 100
        impact:
          type: integer
          minimum: 0
          maximum: 100
      required: [autonomy, productMindset, impact]

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        seniority:
          $ref: "#/components/schemas/Seniority"
        mustHaveSkills:
          type: array
          items:
            type: string
        scoringWeights:
          $ref: "#/components/schemas/ScoringWeights"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, location, seniority, mustHaveSkills, scoringWeights, createdAt, updatedAt]

    CreateJobBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        seniority:
          $ref: "#/components/schemas/Seniority"
        mustHaveSkills:
          type: array
          items:
            type: string
        scoringWeights:
          $ref: "#/components/schemas/ScoringWeights"
      required: [title, description, location, seniority, mustHaveSkills]

    # ── CANDIDATE ──
    Candidate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        linkedIn:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        headline:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        currentCompany:
          type: string
          nullable: true
        githubUrl:
          type: string
          nullable: true
        githubUsername:
          type: string
          nullable: true
        sourcingConfidence:
          type: number
          nullable: true
        source:
          type: string
          nullable: true
        enrichedAt:
          type: string
          format: date-time
          nullable: true
        enrichmentSource:
          type: string
          nullable: true
        enrichmentConfidence:
          type: number
          nullable: true
        enrichmentStatus:
          type: string
          enum: [enriched, partial, failed]
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, skills, createdAt, updatedAt]

    CreateCandidateBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        linkedIn:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
      required: [name, email, skills]

    # ── APPLICATION ──
    Application:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        candidateId:
          type: integer
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, jobId, candidateId, stage, createdAt, updatedAt]

    ApplicationWithDetails:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        candidateId:
          type: integer
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        job:
          $ref: "#/components/schemas/Job"
        candidate:
          $ref: "#/components/schemas/Candidate"
      required: [id, jobId, candidateId, stage, createdAt, updatedAt, job, candidate]

    CreateApplicationBody:
      type: object
      properties:
        jobId:
          type: integer
        candidateId:
          type: integer
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
      required: [jobId, candidateId, stage]

    UpdateApplicationBody:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
      required: [stage]

    # ── NOTES & COMMENTS ──
    CandidateNote:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        jobId:
          type: integer
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, candidateId, jobId, author, body, createdAt]

    CreateCandidateNoteBody:
      type: object
      properties:
        jobId:
          type: integer
        author:
          type: string
        body:
          type: string
      required: [jobId, author, body]

    CommentMention:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    CandidateComment:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        jobId:
          type: integer
        parentId:
          type: integer
          nullable: true
        author:
          type: string
        body:
          type: string
        mentions:
          type: array
          items:
            $ref: "#/components/schemas/CommentMention"
        createdAt:
          type: string
          format: date-time
      required: [id, candidateId, jobId, author, body, mentions, createdAt]

    CreateCandidateCommentBody:
      type: object
      properties:
        jobId:
          type: integer
        parentId:
          type: integer
          nullable: true
        author:
          type: string
        body:
          type: string
        mentions:
          type: array
          items:
            $ref: "#/components/schemas/CommentMention"
      required: [jobId, author, body]

    TeamMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        email:
          type: string
        initials:
          type: string
        color:
          type: string
      required: [id, name, role, email, initials, color]

    MentionEntry:
      type: object
      description: A comment that mentions a particular team member, with candidate/job context for the inbox.
      properties:
        comment:
          $ref: "#/components/schemas/CandidateComment"
        candidateName:
          type: string
        jobTitle:
          type: string
      required: [comment, candidateName, jobTitle]

    # ── PROVIDERS ──
    ProviderType:
      type: string
      enum: [native_openai, custom_webhook, twin_webhook, github]

    WorkflowStepName:
      type: string
      enum: [job_understanding, candidate_matching, shortlist_generation, sourcing_later, sourcing, enrichment]

    AgentProviderRecord:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProviderType"
        baseUrl:
          type: string
          nullable: true
        webhookUrl:
          type: string
          nullable: true
        apiKeyEncryptedPlaceholder:
          type: string
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, enabled, createdAt, updatedAt]

    CreateProviderBody:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProviderType"
        baseUrl:
          type: string
          nullable: true
        webhookUrl:
          type: string
          nullable: true
        apiKeyPlaceholder:
          type: string
          nullable: true
        enabled:
          type: boolean
      required: [name, type]

    ToggleProviderBody:
      type: object
      properties:
        enabled:
          type: boolean
      required: [enabled]

    ConnectionTestResult:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
          nullable: true
        latencyMs:
          type: integer
          nullable: true
      required: [ok]

    ProviderStepSetting:
      type: object
      properties:
        id:
          type: integer
        workflowStep:
          $ref: "#/components/schemas/WorkflowStepName"
        providerId:
          type: integer
        enabled:
          type: boolean
      required: [id, workflowStep, providerId, enabled]

    ProviderStepSettingWithProvider:
      type: object
      properties:
        id:
          type: integer
        workflowStep:
          $ref: "#/components/schemas/WorkflowStepName"
        providerId:
          type: integer
        enabled:
          type: boolean
        provider:
          $ref: "#/components/schemas/AgentProviderRecord"
      required: [id, workflowStep, providerId, enabled, provider]

    UpsertStepSettingBody:
      type: object
      properties:
        workflowStep:
          $ref: "#/components/schemas/WorkflowStepName"
        providerId:
          type: integer
        enabled:
          type: boolean
      required: [workflowStep, providerId, enabled]

    # ── WORKFLOWS ──
    RunWorkflowBody:
      type: object
      properties:
        jobId:
          type: integer
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        runEnrichment:
          type: boolean
      required: [jobId]

    VariantCriteria:
      type: object
      properties:
        seniority:
          type: string
          nullable: true
        mustHaveSkills:
          type: array
          items:
            type: string
          nullable: true
        focusNote:
          type: string
          nullable: true

    ImproveAndRerunBody:
      type: object
      properties:
        runId:
          type: integer
          description: ID of the completed run to improve
      required: [runId]

    ImproveAndRerunResult:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/AgentRun"
        previousRunId:
          type: integer
        lowConfidenceCandidateCount:
          type: integer
      required: [run, previousRunId, lowConfidenceCandidateCount]

    RunVariantBody:
      type: object
      properties:
        jobId:
          type: integer
        baseRunId:
          type: integer
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          $ref: "#/components/schemas/VariantCriteria"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        runEnrichment:
          type: boolean
      required: [jobId, baseRunId, variantCriteria]

    JobRunSummary:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        status:
          $ref: "#/components/schemas/RunStatus"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        variantOf:
          type: integer
          nullable: true
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VariantCriteria"
        createdAt:
          type: string
          format: date-time
      required: [id, jobId, status, dataMode, runSourcing, createdAt]

    DataMode:
      type: string
      enum: [real, mock, fallback]
      description: >
        Enforces strict data separation. "real" uses only Twin-sourced or
        imported candidates. "mock" uses only AI-generated mock candidates.
        "fallback" means a real run where the Twin provider failed and native
        was used instead.

    RunStatus:
      type: string
      enum: [pending, running, completed, failed]

    StepStatus:
      type: string
      enum: [pending, running, completed, failed]

    AgentRun:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        status:
          $ref: "#/components/schemas/RunStatus"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        variantOf:
          type: integer
          nullable: true
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VariantCriteria"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, jobId, status, dataMode, runSourcing, createdAt, updatedAt]

    AgentLog:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        step:
          type: string
        input:
          nullable: true
        output:
          nullable: true
        status:
          $ref: "#/components/schemas/StepStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, runId, step, status, createdAt]

    AgentRunWithLogs:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        status:
          $ref: "#/components/schemas/RunStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AgentLog"
      required: [id, jobId, status, createdAt, updatedAt, logs]

    Recommendation:
      type: string
      enum: [Strong Yes, Yes, Maybe, No]

    ConfidenceLevel:
      type: string
      enum: [High, Medium, Low]

    CandidateEvaluation:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        jobId:
          type: integer
        candidateId:
          type: integer
        score:
          type: integer
          description: "Decision score (backward-compat alias). Use decisionScore."
        fitScore:
          type: integer
          nullable: true
          description: "AI-assessed candidate fit (0-100). Not penalized by data quality."
        dataConfidenceScore:
          type: integer
          nullable: true
          description: "How complete and verifiable the candidate's profile is (0-100)."
        decisionScore:
          type: integer
          nullable: true
          description: "fitScore × (0.6 + 0.4 × dataConfidence/100). Main ranking score."
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          nullable: true
        confidenceReason:
          type: string
          nullable: true
        missingDataWarnings:
          type: array
          items:
            type: string
        requiresEnrichment:
          type: boolean
          nullable: true
          description: "True when data confidence was too low and no enrichment provider was available. Score reliability is reduced — enrichment is recommended before acting on this result."
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        recommendation:
          $ref: "#/components/schemas/Recommendation"
        candidate:
          $ref: "#/components/schemas/Candidate"
        createdAt:
          type: string
          format: date-time
      required: [id, runId, jobId, candidateId, score, strengths, gaps, risks, recommendation, candidate, createdAt]

    JobInsight:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        jobId:
          type: integer
        mustHaveSkills:
          type: array
          items:
            type: string
        seniority:
          type: string
        evaluationCriteria:
          type: array
          items:
            type: string
        idealCandidateProfile:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, runId, jobId, mustHaveSkills, seniority, evaluationCriteria, idealCandidateProfile, createdAt]

    ShortlistEntry:
      type: object
      properties:
        candidateId:
          type: integer
        candidateName:
          type: string
        whyRelevant:
          type: string
        keyRisks:
          type: string
        finalRecommendation:
          type: string
      required: [candidateId, candidateName, whyRelevant, keyRisks, finalRecommendation]

    Shortlist:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        jobId:
          type: integer
        rankedCandidateIds:
          type: array
          items:
            type: integer
        summaries:
          type: array
          items:
            $ref: "#/components/schemas/ShortlistEntry"
        createdAt:
          type: string
          format: date-time
      required: [id, runId, jobId, rankedCandidateIds, summaries, createdAt]

    SourcingCandidateResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        headline:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        currentCompany:
          type: string
          nullable: true
        email:
          type: string
        linkedIn:
          type: string
          nullable: true
        githubUrl:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        summary:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
      required: [id, name, email, skills]

    JobWorkflowResult:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/AgentRun"
        insight:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/JobInsight"
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/CandidateEvaluation"
        shortlist:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Shortlist"
        sourcedCandidates:
          type: array
          items:
            $ref: "#/components/schemas/SourcingCandidateResult"
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AgentLog"
      required: [run, evaluations, logs, sourcedCandidates]

    # ── REPORTS ──
    ReportRunMeta:
      type: object
      properties:
        id:
          type: integer
        runDate:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/RunStatus"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        variantOf:
          type: integer
          nullable: true
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VariantCriteria"
      required: [id, runDate, status, dataMode, runSourcing]

    ReportEvaluation:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        score:
          type: integer
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        recommendation:
          $ref: "#/components/schemas/Recommendation"
        candidate:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Candidate"
        summary:
          nullable: true
          type: object
          properties:
            candidateId:
              type: integer
            whyRelevant:
              type: string
            keyRisks:
              type: string
            finalRecommendation:
              type: string
      required: [id, candidateId, score, strengths, gaps, risks, recommendation]

    RecommendationSummary:
      type: object
      properties:
        Strong Yes:
          type: integer
        Yes:
          type: integer
        Maybe:
          type: integer
        No:
          type: integer
      required: ["Strong Yes", "Yes", "Maybe", "No"]

    HiringReport:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        run:
          $ref: "#/components/schemas/ReportRunMeta"
        job:
          $ref: "#/components/schemas/Job"
        insight:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/JobInsight"
        top5:
          type: array
          items:
            $ref: "#/components/schemas/ReportEvaluation"
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/ReportEvaluation"
        recommendationSummary:
          $ref: "#/components/schemas/RecommendationSummary"
        interviewFocusAreas:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
      required: [generatedAt, run, job, top5, evaluations, recommendationSummary, interviewFocusAreas, risks]

    # ── SUMMARY ──
    StageCount:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        count:
          type: integer
      required: [stage, count]

    PipelineSummary:
      type: object
      properties:
        totalJobs:
          type: integer
        totalCandidates:
          type: integer
        totalApplications:
          type: integer
        byStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
      required: [totalJobs, totalCandidates, totalApplications, byStage]
