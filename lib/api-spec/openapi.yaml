openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HiringAI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Job operations
  - name: candidates
    description: Candidate operations
  - name: applications
    description: Application pipeline operations
  - name: workflows
    description: Agentic workflow operations
  - name: providers
    description: Agent provider management
  - name: reports
    description: Hiring manager report exports
  - name: notes
    description: Recruiter notes and threaded team comments on candidates
  - name: team
    description: Lightweight team roster used for @mentions
  - name: settings
    description: Admin-tunable application settings
  - name: email-status-changes
    description: Inbox of regressions in candidate email validation status
  - name: branding
    description: Runtime-editable global product branding (product name, company name, logo URL)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── JOBS ──────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{id}/applications:
    get:
      operationId: getJobApplications
      tags: [jobs]
      summary: Get all applications for a job (with candidate info)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Applications for this job
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"

  # ── CANDIDATES ────────────────────────────────────────────────────────────
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List all candidates
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"
    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateBody"
      responses:
        "201":
          description: Candidate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Not found
    put:
      operationId: updateCandidate
      tags: [candidates]
      summary: Update a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateBody"
      responses:
        "200":
          description: Candidate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
    delete:
      operationId: deleteCandidate
      tags: [candidates]
      summary: Delete a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /candidates/{id}/recheck-email:
    post:
      operationId: recheckCandidateEmail
      tags: [candidates]
      summary: Re-validate this candidate's email deliverability now
      description: >
        Runs the same MX-record validation pipeline used at sourcing time and
        updates `emailValidationStatus`, `emailValidationReason`, and
        `emailValidatedAt`. Recruiters can use this to refresh a stale check
        from the candidate detail page.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate with refreshed email validation fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Not found

  /candidates/bulk:
    post:
      operationId: bulkCandidateAction
      tags: [candidates]
      summary: Run a batched action on a filtered set of candidates
      description: >
        Single endpoint backing the recruiter "bulk action bar". Accepts up to 500 candidate
        ids and one of `delete`, `recheck-email`, `move-stage`, `export-csv`. The frontend is
        expected to chunk selections larger than 500 itself.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCandidateActionBody"
      responses:
        "200":
          description: Action completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCandidateActionResult"
        "400":
          description: Invalid action / payload combination

  /candidates/{id}/applications:
    get:
      operationId: getCandidateApplications
      tags: [candidates]
      summary: Get all applications for a candidate (with job info)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Applications for this candidate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"

  # ── APPLICATIONS ──────────────────────────────────────────────────────────
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List all applications with candidate and job info
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create an application (link candidate to job)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get an application by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationWithDetails"
        "404":
          description: Not found
    put:
      operationId: updateApplication
      tags: [applications]
      summary: Update an application (e.g. change stage)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationBody"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── WORKFLOWS ─────────────────────────────────────────────────────────────
  /workflows/run:
    post:
      operationId: runWorkflow
      tags: [workflows]
      summary: Start an agentic workflow run for a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunWorkflowBody"
      responses:
        "201":
          description: Workflow run created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"

  /workflows/runs:
    get:
      operationId: listWorkflowRuns
      tags: [workflows]
      summary: List all workflow runs
      responses:
        "200":
          description: List of workflow runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRun"

  /workflows/runs/{id}:
    get:
      operationId: getWorkflowRun
      tags: [workflows]
      summary: Get a specific workflow run with logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow run with logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunWithLogs"
        "404":
          description: Not found

  /workflows/jobs/{jobId}/latest:
    get:
      operationId: getLatestJobWorkflow
      tags: [workflows]
      summary: Get the latest workflow run for a job (with results)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest run with insights, evaluations, shortlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobWorkflowResult"
        "404":
          description: No runs found for this job

  # ── AGENT PROVIDERS ────────────────────────────────────────────────────────
  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all agent providers
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentProviderRecord"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a new agent provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderBody"
      responses:
        "201":
          description: Provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"

  /providers/{id}:
    get:
      operationId: getProvider
      tags: [providers]
      summary: Get a provider by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"
        "404":
          description: Not found
    put:
      operationId: updateProvider
      tags: [providers]
      summary: Update a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderBody"
      responses:
        "200":
          description: Provider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"
    delete:
      operationId: deleteProvider
      tags: [providers]
      summary: Delete a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /providers/{id}/toggle:
    post:
      operationId: toggleProvider
      tags: [providers]
      summary: Enable or disable a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleProviderBody"
      responses:
        "200":
          description: Provider toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProviderRecord"

  /providers/{id}/test:
    post:
      operationId: testProviderConnection
      tags: [providers]
      summary: Test a provider connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /providers/preview-github-query:
    post:
      operationId: previewGithubQuery
      tags: [providers]
      summary: Build the exact GitHub user-search query for a job + (optional) tuning config
      description: >
        Returns the assembled `q=` string the GitHub Agent would send for a given job,
        applying recruiter-tunable knobs (extra keywords, exclude orgs, min followers,
        min repos). Optionally hits the live GitHub Search API once to report
        `total_count` so recruiters can gauge a query before kicking off a real run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewGithubQueryBody"
      responses:
        "200":
          description: Assembled query (and optional match count)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewGithubQueryResult"
        "404":
          description: Job not found

  /providers/steps:
    get:
      operationId: listProviderStepSettings
      tags: [providers]
      summary: List all workflow step → provider assignments
      responses:
        "200":
          description: Step settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderStepSettingWithProvider"
    post:
      operationId: upsertProviderStepSetting
      tags: [providers]
      summary: Assign a provider to a workflow step (create or replace)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertStepSettingBody"
      responses:
        "200":
          description: Setting saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderStepSettingWithProvider"

  /settings/email-revalidation:
    get:
      operationId: getEmailRevalidationSettings
      tags: [settings]
      summary: Get the current email re-validation scheduler settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailRevalidationSettings"
    put:
      operationId: updateEmailRevalidationSettings
      tags: [settings]
      summary: Update the email re-validation scheduler settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailRevalidationSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailRevalidationSettings"

  /settings/email-revalidation/runs:
    get:
      operationId: listEmailRevalidationRuns
      tags: [settings]
      summary: List recent email re-validation sweep runs (newest first)
      responses:
        "200":
          description: Recent sweep runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailRevalidationRun"

  /settings/email-revalidation/sweep:
    post:
      operationId: runEmailRevalidationSweepNow
      tags: [settings]
      summary: Trigger a one-off email re-validation sweep immediately
      responses:
        "200":
          description: Sweep completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailRevalidationRun"

  /workflows/improve-and-rerun:
    post:
      operationId: improveAndRerun
      tags: [workflows]
      summary: Enrich low-confidence candidates from a completed run and re-score them
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveAndRerunBody"
      responses:
        "201":
          description: New run created and started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImproveAndRerunResult"
        "400":
          description: No low-confidence candidates found or run not completed
        "404":
          description: Run not found

  /workflows/run-variant:
    post:
      operationId: runVariantWorkflow
      tags: [workflows]
      summary: Create and run a variant workflow with modified job criteria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunVariantBody"
      responses:
        "201":
          description: Variant run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"

  /workflows/jobs/{jobId}/runs:
    get:
      operationId: listJobRuns
      tags: [workflows]
      summary: List all runs for a job (baseline + variants)
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobRunSummary"

  # ── SUMMARY / WOW ─────────────────────────────────────────────────────────
  # ── REPORTS ────────────────────────────────────────────────────────────────
  /reports/job/{jobId}/run/{runId}:
    get:
      operationId: getJobReportForRun
      tags: [reports]
      summary: Get hiring manager report for a specific workflow run
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hiring manager report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiringReport"
        "404":
          description: Run not found

  /reports/job/{jobId}/latest:
    get:
      operationId: getJobReport
      tags: [reports]
      summary: Get full hiring manager report for the latest completed workflow run
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hiring manager report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiringReport"
        "404":
          description: No completed run found

  /reports/job/{jobId}/latest/markdown:
    get:
      operationId: getJobReportMarkdown
      tags: [reports]
      summary: Export hiring manager report as Markdown
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Markdown report file
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: No completed run found

  /reports/job/{jobId}/latest/pdf:
    get:
      operationId: getJobReportPdf
      tags: [reports]
      summary: Export hiring manager report as PDF
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF report file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: No completed run found

  # ── BRANDING ───────────────────────────────────────────────────────────────
  /branding:
    get:
      operationId: getBrandingSettings
      tags: [branding]
      summary: Get the current global branding (with template defaults filled in)
      responses:
        "200":
          description: Resolved branding values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandingSettings"
    put:
      operationId: updateBrandingSettings
      tags: [branding]
      summary: Update global branding overrides (productName, companyName, logoUrl)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandingSettingsBody"
      responses:
        "200":
          description: Branding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandingSettings"

  # ── NOTES & COMMENTS ────────────────────────────────────────────────────────
  /candidates/{candidateId}/notes:
    get:
      operationId: listCandidateNotes
      tags: [notes]
      summary: List recruiter notes for a candidate (optionally scoped to a job)
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Notes for the candidate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateNote"
    post:
      operationId: createCandidateNote
      tags: [notes]
      summary: Add a recruiter note to a candidate
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateNoteBody"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateNote"

  /candidates/{candidateId}/notes/{noteId}:
    delete:
      operationId: deleteCandidateNote
      tags: [notes]
      summary: Delete a recruiter note
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /candidates/{candidateId}/comments:
    get:
      operationId: listCandidateComments
      tags: [notes]
      summary: List threaded team comments for a candidate (optionally scoped to a job)
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Comments for the candidate
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateComment"
    post:
      operationId: createCandidateComment
      tags: [notes]
      summary: Add a comment (top-level or reply) to a candidate
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCandidateCommentBody"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateComment"

  /candidates/{candidateId}/comments/{commentId}:
    delete:
      operationId: deleteCandidateComment
      tags: [notes]
      summary: Delete a comment
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── TEAM ────────────────────────────────────────────────────────────────────
  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List the team roster used for @mention autocomplete
      responses:
        "200":
          description: Team roster
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /team/{memberId}/mentions:
    get:
      operationId: listMentionsForMember
      tags: [team]
      summary: List recent comments that mention a given team member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: ISO timestamp; only return comments newer than this
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Comments mentioning this member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentionEntry"

  # ── EMAIL STATUS CHANGES (regressions inbox) ───────────────────────────────
  /email-status-changes:
    get:
      operationId: listEmailStatusChanges
      tags: [email-status-changes]
      summary: List recent email validation regressions
      parameters:
        - name: unread
          in: query
          required: false
          description: When true, only return rows that have not been marked read.
          schema:
            type: boolean
        - name: candidateId
          in: query
          required: false
          description: When set, only return rows for this candidate.
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Email status change rows joined with candidate context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailStatusChange"

  /email-status-changes/{id}/mark-read:
    post:
      operationId: markEmailStatusChangeRead
      tags: [email-status-changes]
      summary: Mark a single regression row as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailStatusChange"
        "404":
          description: Not found

  /email-status-changes/mark-all-read:
    post:
      operationId: markAllEmailStatusChangesRead
      tags: [email-status-changes]
      summary: Mark every unread regression row as read
      responses:
        "200":
          description: Number of rows updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]

  /pipeline/summary:
    get:
      operationId: getPipelineSummary
      tags: [applications]
      summary: Get pipeline summary - counts per stage across all jobs
      responses:
        "200":
          description: Pipeline stage counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── ENUMS ──
    Seniority:
      type: string
      enum: [Intern, Junior, Mid, Senior, Lead, Principal, Director, VP]

    ApplicationStage:
      type: string
      enum: [Sourced, Contacted, Screened, Interview, Offer, Hired, Rejected]

    # ── JOB ──
    ScoringWeights:
      type: object
      description: Per-job scoring weights (integer percentages 0-100, must sum to 100).
      properties:
        autonomy:
          type: integer
          minimum: 0
          maximum: 100
        productMindset:
          type: integer
          minimum: 0
          maximum: 100
        impact:
          type: integer
          minimum: 0
          maximum: 100
      required: [autonomy, productMindset, impact]

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        seniority:
          $ref: "#/components/schemas/Seniority"
        mustHaveSkills:
          type: array
          items:
            type: string
        clientName:
          type: string
          nullable: true
        clientLogoUrl:
          type: string
          nullable: true
        scoringWeights:
          $ref: "#/components/schemas/ScoringWeights"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, location, seniority, mustHaveSkills, scoringWeights, createdAt, updatedAt]

    CreateJobBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        seniority:
          $ref: "#/components/schemas/Seniority"
        mustHaveSkills:
          type: array
          items:
            type: string
        scoringWeights:
          $ref: "#/components/schemas/ScoringWeights"
      required: [title, description, location, seniority, mustHaveSkills]

    # ── CANDIDATE ──
    Candidate:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        linkedIn:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        headline:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        currentCompany:
          type: string
          nullable: true
        githubUrl:
          type: string
          nullable: true
        githubUsername:
          type: string
          nullable: true
        sourcingConfidence:
          type: number
          nullable: true
        source:
          type: string
          nullable: true
        emailSource:
          type: string
          enum: [profile, commit, noreply, generated, manual]
          nullable: true
          description: |
            Where the candidate's email came from, so recruiters can gauge
            trust before outreach. "profile" = verified profile email,
            "commit" = inferred from public commit metadata,
            "noreply" = placeholder noreply (not deliverable),
            "generated" = AI/mock placeholder (not deliverable),
            "manual" = entered by a recruiter.
        enrichedAt:
          type: string
          format: date-time
          nullable: true
        enrichmentSource:
          type: string
          nullable: true
        enrichmentConfidence:
          type: number
          nullable: true
        enrichmentStatus:
          type: string
          enum: [enriched, partial, failed]
          nullable: true
        emailValidationStatus:
          type: string
          enum: [valid, invalid, risky, unchecked]
          nullable: true
        emailValidationReason:
          type: string
          nullable: true
        emailValidatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, skills, createdAt, updatedAt]

    CreateCandidateBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        linkedIn:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
      required: [name, email, skills]

    # ── BULK ACTIONS ──
    BulkCandidateAction:
      type: string
      enum: [delete, recheck-email, move-stage, export-csv]

    BulkCandidateActionPayload:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        jobId:
          type: integer

    BulkCandidateActionBody:
      type: object
      properties:
        ids:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: integer
        action:
          $ref: "#/components/schemas/BulkCandidateAction"
        payload:
          $ref: "#/components/schemas/BulkCandidateActionPayload"
      required: [ids, action]

    BulkCandidateRecheckResult:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [valid, invalid, risky, unchecked, skipped, error]
        reason:
          type: string
          nullable: true
      required: [id, status]

    BulkCandidateActionResult:
      type: object
      properties:
        ok:
          type: boolean
        action:
          $ref: "#/components/schemas/BulkCandidateAction"
        processed:
          type: integer
        skipped:
          type: integer
        csv:
          type: string
          nullable: true
          description: Populated only when action is `export-csv`. The frontend turns this into a Blob download.
        results:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/BulkCandidateRecheckResult"
          description: Per-id outcomes for `recheck-email`.
      required: [ok, action, processed, skipped]

    # ── APPLICATION ──
    Application:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        candidateId:
          type: integer
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, jobId, candidateId, stage, createdAt, updatedAt]

    ApplicationWithDetails:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        candidateId:
          type: integer
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        job:
          $ref: "#/components/schemas/Job"
        candidate:
          $ref: "#/components/schemas/Candidate"
      required: [id, jobId, candidateId, stage, createdAt, updatedAt, job, candidate]

    CreateApplicationBody:
      type: object
      properties:
        jobId:
          type: integer
        candidateId:
          type: integer
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
      required: [jobId, candidateId, stage]

    UpdateApplicationBody:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        notes:
          type: string
          nullable: true
      required: [stage]

    # ── NOTES & COMMENTS ──
    CandidateNote:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        jobId:
          type: integer
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, candidateId, jobId, author, body, createdAt]

    CreateCandidateNoteBody:
      type: object
      properties:
        jobId:
          type: integer
        author:
          type: string
        body:
          type: string
      required: [jobId, author, body]

    CommentMention:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required: [id, name]

    CandidateComment:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        jobId:
          type: integer
        parentId:
          type: integer
          nullable: true
        author:
          type: string
        body:
          type: string
        mentions:
          type: array
          items:
            $ref: "#/components/schemas/CommentMention"
        createdAt:
          type: string
          format: date-time
      required: [id, candidateId, jobId, author, body, mentions, createdAt]

    CreateCandidateCommentBody:
      type: object
      properties:
        jobId:
          type: integer
        parentId:
          type: integer
          nullable: true
        author:
          type: string
        body:
          type: string
        mentions:
          type: array
          items:
            $ref: "#/components/schemas/CommentMention"
      required: [jobId, author, body]

    TeamMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        email:
          type: string
        initials:
          type: string
        color:
          type: string
      required: [id, name, role, email, initials, color]

    MentionEntry:
      type: object
      description: A comment that mentions a particular team member, with candidate/job context for the inbox.
      properties:
        comment:
          $ref: "#/components/schemas/CandidateComment"
        candidateName:
          type: string
        jobTitle:
          type: string
      required: [comment, candidateName, jobTitle]

    EmailStatusChange:
      type: object
      description: A regression in a candidate's email validation status — surfaced in the recruiter inbox so a previously verified address can't silently go bad.
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        candidateName:
          type: string
        candidateEmail:
          type: string
          nullable: true
        previousStatus:
          type: string
        newStatus:
          type: string
        previousReason:
          type: string
          nullable: true
        newReason:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
        notifiedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - candidateId
        - candidateName
        - previousStatus
        - newStatus
        - changedAt

    # ── PROVIDERS ──
    ProviderType:
      type: string
      enum: [native_openai, custom_webhook, twin_webhook, github, web_search]

    WorkflowStepName:
      type: string
      enum: [job_understanding, candidate_matching, shortlist_generation, sourcing_later, sourcing, enrichment]

    GithubProviderConfig:
      type: object
      description: Recruiter-tunable knobs for the GitHub Agent's user-search query.
      properties:
        extraKeywords:
          type: string
          nullable: true
          description: Free-text keywords appended verbatim to the search query (e.g. "open source", "fintech").
        excludeOrgs:
          type: string
          nullable: true
          description: Comma- or space-separated GitHub org/user logins to exclude from results (e.g. "google, microsoft").
        minFollowers:
          type: integer
          nullable: true
          description: Minimum follower count (adds `followers:>=N` to the query).
        minRepos:
          type: integer
          nullable: true
          description: Minimum public repo count (adds `repos:>=N` to the query).
        requireBio:
          type: boolean
          nullable: true
          description: Drop candidates with empty profile bios (post-fetch filter).
        activeWithinMonths:
          type: integer
          nullable: true
          description: Drop candidates whose latest public event is older than N months (post-fetch filter).

    WebSearchProviderConfig:
      type: object
      description: Recruiter-tunable knobs for the Web Search (SerpAPI) provider's Google query.
      properties:
        extraKeywords:
          type: string
          nullable: true
          description: Free-text keywords appended verbatim to the Google query (e.g. "remote", "fintech").
        targetSites:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Sites the search should focus on, joined as `(site:a OR site:b ...)`. Defaults to
            `linkedin.com/in` and `github.com` when empty/omitted.
        excludeSites:
          type: array
          items:
            type: string
          nullable: true
          description: Domains/paths excluded via `-site:` operators (e.g. "pinterest.com").

    AgentProviderConfig:
      type: object
      description: Per-provider tuning knobs. Only the section matching the provider type is read.
      properties:
        github:
          $ref: "#/components/schemas/GithubProviderConfig"
        web_search:
          $ref: "#/components/schemas/WebSearchProviderConfig"

    AgentProviderRecord:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProviderType"
        baseUrl:
          type: string
          nullable: true
        webhookUrl:
          type: string
          nullable: true
        apiKeyEncryptedPlaceholder:
          type: string
          nullable: true
        config:
          allOf:
            - $ref: "#/components/schemas/AgentProviderConfig"
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, type, enabled, createdAt, updatedAt]

    CreateProviderBody:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/ProviderType"
        baseUrl:
          type: string
          nullable: true
        webhookUrl:
          type: string
          nullable: true
        apiKeyPlaceholder:
          type: string
          nullable: true
        config:
          allOf:
            - $ref: "#/components/schemas/AgentProviderConfig"
          nullable: true
        enabled:
          type: boolean
      required: [name, type]

    ToggleProviderBody:
      type: object
      properties:
        enabled:
          type: boolean
      required: [enabled]

    PreviewGithubQueryBody:
      type: object
      description: >
        Build the GitHub user-search query for a given job. When `config` is supplied
        it's used verbatim (lets the provider edit dialog preview unsaved tuning).
        Otherwise, if `providerId` points at a github-typed provider, its saved config
        is used. If neither is supplied, the query is built with no extra tuning knobs.
      properties:
        jobId:
          type: integer
          description: Job whose title / location / seniority / must-have skills feed the query.
        providerId:
          type: integer
          nullable: true
          description: GitHub-typed provider id whose saved config should be used. Ignored when `config` is supplied.
        config:
          allOf:
            - $ref: "#/components/schemas/GithubProviderConfig"
          nullable: true
          description: Inline tuning knobs (overrides any saved provider config).
        runMatches:
          type: boolean
          nullable: true
          description: When true, also hit GitHub /search/users once and report total_count.
      required: [jobId]

    PreviewGithubQueryResult:
      type: object
      properties:
        query:
          type: string
          description: The exact `q=` value the GitHub Agent would send for this job + config.
        totalCount:
          type: integer
          nullable: true
          description: Number of matching GitHub users (only set when `runMatches=true` succeeded).
        totalCountError:
          type: string
          nullable: true
          description: Friendly error if the live preview lookup failed (rate-limit, network, etc.).
      required: [query]

    ConnectionTestResult:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
          nullable: true
        latencyMs:
          type: integer
          nullable: true
      required: [ok]

    ProviderStepSetting:
      type: object
      properties:
        id:
          type: integer
        workflowStep:
          $ref: "#/components/schemas/WorkflowStepName"
        providerId:
          type: integer
        enabled:
          type: boolean
      required: [id, workflowStep, providerId, enabled]

    ProviderStepSettingWithProvider:
      type: object
      properties:
        id:
          type: integer
        workflowStep:
          $ref: "#/components/schemas/WorkflowStepName"
        providerId:
          type: integer
        enabled:
          type: boolean
        provider:
          $ref: "#/components/schemas/AgentProviderRecord"
      required: [id, workflowStep, providerId, enabled, provider]

    UpsertStepSettingBody:
      type: object
      properties:
        workflowStep:
          $ref: "#/components/schemas/WorkflowStepName"
        providerId:
          type: integer
        enabled:
          type: boolean
      required: [workflowStep, providerId, enabled]

    # ── SETTINGS ──
    EmailRevalidationSettings:
      type: object
      properties:
        thresholdDays:
          type: integer
          description: Days after which a previously validated email is considered stale.
          minimum: 1
          maximum: 365
        intervalMs:
          type: integer
          description: Milliseconds between sweeper runs. Set to 0 (with enabled=false) to disable.
          minimum: 0
        batchSize:
          type: integer
          description: Maximum number of candidates re-checked per sweep.
          minimum: 1
          maximum: 10000
        retentionDays:
          type: integer
          description: How many days of sweep history to keep. Older rows are pruned at the end of each sweep.
          minimum: 1
          maximum: 365
        enabled:
          type: boolean
          description: When false, the scheduler is paused.
        updatedAt:
          type: string
          format: date-time
      required: [thresholdDays, intervalMs, batchSize, retentionDays, enabled, updatedAt]

    UpdateEmailRevalidationSettingsBody:
      type: object
      properties:
        thresholdDays:
          type: integer
          minimum: 1
          maximum: 365
        intervalMs:
          type: integer
          minimum: 0
        batchSize:
          type: integer
          minimum: 1
          maximum: 10000
        retentionDays:
          type: integer
          minimum: 1
          maximum: 365
        enabled:
          type: boolean
      required: [thresholdDays, intervalMs, batchSize, retentionDays, enabled]

    EmailRevalidationRun:
      type: object
      properties:
        id:
          type: integer
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        rechecked:
          type: integer
          description: Number of candidates re-validated successfully in this sweep.
        errors:
          type: integer
          description: Number of candidates that threw while re-validating.
        trigger:
          type: string
          enum: [scheduled, manual]
          description: Whether the sweep was triggered by the background scheduler or an admin.
        errorMessage:
          type: string
          nullable: true
          description: Populated only when the sweep itself crashed before completing.
      required: [id, startedAt, rechecked, errors, trigger]

    # ── WORKFLOWS ──
    RunWorkflowBody:
      type: object
      properties:
        jobId:
          type: integer
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        runEnrichment:
          type: boolean
      required: [jobId]

    VariantCriteria:
      type: object
      properties:
        seniority:
          type: string
          nullable: true
        mustHaveSkills:
          type: array
          items:
            type: string
          nullable: true
        focusNote:
          type: string
          nullable: true

    ImproveAndRerunBody:
      type: object
      properties:
        runId:
          type: integer
          description: ID of the completed run to improve
      required: [runId]

    ImproveAndRerunResult:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/AgentRun"
        previousRunId:
          type: integer
        lowConfidenceCandidateCount:
          type: integer
      required: [run, previousRunId, lowConfidenceCandidateCount]

    RunVariantBody:
      type: object
      properties:
        jobId:
          type: integer
        baseRunId:
          type: integer
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          $ref: "#/components/schemas/VariantCriteria"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        runEnrichment:
          type: boolean
      required: [jobId, baseRunId, variantCriteria]

    JobRunSummary:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        status:
          $ref: "#/components/schemas/RunStatus"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        variantOf:
          type: integer
          nullable: true
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VariantCriteria"
        createdAt:
          type: string
          format: date-time
        sourcingStats:
          nullable: true
          description: >
            Per-run sourcing filter breakdown (search hits, dropped for empty
            bio, dropped for stale activity, etc.) when the run included a
            sourcing step. Null for runs without sourcing or when the provider
            did not report stats.
          allOf:
            - $ref: "#/components/schemas/SourcingStats"
        sourcingStatus:
          nullable: true
          description: Status of the sourcing step for this run, if any.
          allOf:
            - $ref: "#/components/schemas/StepStatus"
        sourcingSaved:
          type: integer
          nullable: true
          description: Number of new candidates saved by the sourcing step.
        sourcingError:
          type: string
          nullable: true
          description: Error message if the sourcing step failed.
      required: [id, jobId, status, dataMode, runSourcing, createdAt]

    SourcingStats:
      type: object
      description: >
        Optional per-run summary stats a sourcing provider can return
        alongside the candidate list. Lets the UI explain WHY a run returned
        few/no results.
      properties:
        searchTotalCount:
          type: integer
          description: Raw hit count reported by upstream search (e.g. GitHub total_count).
        consideredCount:
          type: integer
          description: Number of candidates the provider actually fetched and inspected.
        extractedCount:
          type: integer
          description: Number of candidates the LLM successfully extracted from raw search results.
        droppedNoBio:
          type: integer
          description: Dropped because the provider's "must have a bio" filter rejected them.
        droppedStale:
          type: integer
          description: Dropped because the provider's "active within N months" filter rejected them.
        droppedFetchError:
          type: integer
          description: Dropped because of a transient per-candidate fetch failure.
        droppedNoProfile:
          type: integer
          description: Dropped because no usable profile URL could be extracted (web-search providers).
        droppedFabricated:
          type: integer
          description: Dropped because the URL or evidence looked fabricated by the LLM.
        droppedInvalid:
          type: integer
          description: Dropped because the row failed schema/quality validation.
        returnedCount:
          type: integer
          description: Final count of candidates returned to the engine.

    DataMode:
      type: string
      enum: [real, mock, fallback]
      description: >
        Enforces strict data separation. "real" uses only Twin-sourced or
        imported candidates. "mock" uses only AI-generated mock candidates.
        "fallback" means a real run where the Twin provider failed and native
        was used instead.

    RunStatus:
      type: string
      enum: [pending, running, completed, failed]

    StepStatus:
      type: string
      enum: [pending, running, completed, failed]

    AgentRun:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        status:
          $ref: "#/components/schemas/RunStatus"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        variantOf:
          type: integer
          nullable: true
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VariantCriteria"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, jobId, status, dataMode, runSourcing, createdAt, updatedAt]

    AgentLog:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        step:
          type: string
        input:
          nullable: true
        output:
          nullable: true
        status:
          $ref: "#/components/schemas/StepStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, runId, step, status, createdAt]

    AgentRunWithLogs:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        status:
          $ref: "#/components/schemas/RunStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AgentLog"
      required: [id, jobId, status, createdAt, updatedAt, logs]

    Recommendation:
      type: string
      enum: [Strong Yes, Yes, Maybe, No]

    ConfidenceLevel:
      type: string
      enum: [High, Medium, Low]

    CandidateEvaluation:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        jobId:
          type: integer
        candidateId:
          type: integer
        score:
          type: integer
          description: "Decision score (backward-compat alias). Use decisionScore."
        fitScore:
          type: integer
          nullable: true
          description: "AI-assessed candidate fit (0-100). Not penalized by data quality."
        dataConfidenceScore:
          type: integer
          nullable: true
          description: "How complete and verifiable the candidate's profile is (0-100)."
        decisionScore:
          type: integer
          nullable: true
          description: "fitScore × (0.6 + 0.4 × dataConfidence/100). Main ranking score."
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          nullable: true
        confidenceReason:
          type: string
          nullable: true
        missingDataWarnings:
          type: array
          items:
            type: string
        requiresEnrichment:
          type: boolean
          nullable: true
          description: "True when data confidence was too low and no enrichment provider was available. Score reliability is reduced — enrichment is recommended before acting on this result."
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        recommendation:
          $ref: "#/components/schemas/Recommendation"
        candidate:
          $ref: "#/components/schemas/Candidate"
        createdAt:
          type: string
          format: date-time
      required: [id, runId, jobId, candidateId, score, strengths, gaps, risks, recommendation, candidate, createdAt]

    JobInsight:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        jobId:
          type: integer
        mustHaveSkills:
          type: array
          items:
            type: string
        seniority:
          type: string
        evaluationCriteria:
          type: array
          items:
            type: string
        idealCandidateProfile:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, runId, jobId, mustHaveSkills, seniority, evaluationCriteria, idealCandidateProfile, createdAt]

    ShortlistEntry:
      type: object
      properties:
        candidateId:
          type: integer
        candidateName:
          type: string
        whyRelevant:
          type: string
        keyRisks:
          type: string
        finalRecommendation:
          type: string
      required: [candidateId, candidateName, whyRelevant, keyRisks, finalRecommendation]

    Shortlist:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        jobId:
          type: integer
        rankedCandidateIds:
          type: array
          items:
            type: integer
        summaries:
          type: array
          items:
            $ref: "#/components/schemas/ShortlistEntry"
        createdAt:
          type: string
          format: date-time
      required: [id, runId, jobId, rankedCandidateIds, summaries, createdAt]

    SourcingCandidateResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        headline:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        currentCompany:
          type: string
          nullable: true
        email:
          type: string
        linkedIn:
          type: string
          nullable: true
        githubUrl:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        summary:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
      required: [id, name, email, skills]

    JobWorkflowResult:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/AgentRun"
        insight:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/JobInsight"
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/CandidateEvaluation"
        shortlist:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Shortlist"
        sourcedCandidates:
          type: array
          items:
            $ref: "#/components/schemas/SourcingCandidateResult"
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AgentLog"
      required: [run, evaluations, logs, sourcedCandidates]

    # ── REPORTS ──
    ReportRunMeta:
      type: object
      properties:
        id:
          type: integer
        runDate:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/RunStatus"
        dataMode:
          $ref: "#/components/schemas/DataMode"
        runSourcing:
          type: boolean
        variantOf:
          type: integer
          nullable: true
        variantLabel:
          type: string
          nullable: true
        variantCriteria:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/VariantCriteria"
      required: [id, runDate, status, dataMode, runSourcing]

    ReportEvaluation:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        score:
          type: integer
        strengths:
          type: array
          items:
            type: string
        gaps:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        recommendation:
          $ref: "#/components/schemas/Recommendation"
        candidate:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Candidate"
        summary:
          nullable: true
          type: object
          properties:
            candidateId:
              type: integer
            whyRelevant:
              type: string
            keyRisks:
              type: string
            finalRecommendation:
              type: string
      required: [id, candidateId, score, strengths, gaps, risks, recommendation]

    RecommendationSummary:
      type: object
      properties:
        Strong Yes:
          type: integer
        Yes:
          type: integer
        Maybe:
          type: integer
        No:
          type: integer
      required: ["Strong Yes", "Yes", "Maybe", "No"]

    HiringReport:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        run:
          $ref: "#/components/schemas/ReportRunMeta"
        job:
          $ref: "#/components/schemas/Job"
        insight:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/JobInsight"
        top5:
          type: array
          items:
            $ref: "#/components/schemas/ReportEvaluation"
        evaluations:
          type: array
          items:
            $ref: "#/components/schemas/ReportEvaluation"
        recommendationSummary:
          $ref: "#/components/schemas/RecommendationSummary"
        interviewFocusAreas:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
      required: [generatedAt, run, job, top5, evaluations, recommendationSummary, interviewFocusAreas, risks]

    # ── SUMMARY ──
    StageCount:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/ApplicationStage"
        count:
          type: integer
      required: [stage, count]

    PipelineSummary:
      type: object
      properties:
        totalJobs:
          type: integer
        totalCandidates:
          type: integer
        totalApplications:
          type: integer
        byStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
      required: [totalJobs, totalCandidates, totalApplications, byStage]

    # ── BRANDING ──
    BrandingSettings:
      type: object
      description: Resolved branding values (overrides merged with template defaults)
      properties:
        productName:
          type: string
        companyName:
          type: string
        logoUrl:
          type: string
        colorPrimary:
          type: string
          description: Brand primary color as a 6-digit hex (e.g. "#0B0B12"). Used for CTAs and report headings.
        colorAccent:
          type: string
          description: Brand accent color as a 6-digit hex (e.g. "#7C5CFF"). Used for secondary highlights, sidebar active item, and PDF accents.
        updatedAt:
          type: string
          format: date-time
          nullable: true
      required: [productName, companyName, logoUrl, colorPrimary, colorAccent]

    UpdateBrandingSettingsBody:
      type: object
      description: Partial branding update. Pass empty string to clear back to template default.
      properties:
        productName:
          type: string
        companyName:
          type: string
        logoUrl:
          type: string
        colorPrimary:
          type: string
          description: 6-digit hex color (e.g. "#7C5CFF"), or empty string to reset to template default.
        colorAccent:
          type: string
          description: 6-digit hex color (e.g. "#7C5CFF"), or empty string to reset to template default.
